<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexe · Audit CRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --paper:#F4EDE0; --paper-2:#EFE6D4; --bone:#E8DFCE;
  --ink:#1B2A3A; --ink-soft:#4A5A6E; --ink-faint:#8A95A2;
  --vermilion:#C8413A; --vermilion-2:#A83530;
  --sage:#7A8F7A; --ochre:#C49A3E;
  --asagi:#418AA3; --shikon:#7B3B6E;
  --ink-4:rgba(27,42,58,0.04); --ink-8:rgba(27,42,58,0.08);
  --ink-12:rgba(27,42,58,0.12); --ink-32:rgba(27,42,58,0.32);
  --font-display:'Instrument Serif','Times New Roman',Georgia,serif;
  --font-body:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace;
  --shadow-card:0 1px 0 rgba(27,42,58,.06),0 12px 32px -16px rgba(27,42,58,.18);
  --ease:cubic-bezier(0.2,0.6,0.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:400;letter-spacing:-0.01em;line-height:1.02;margin:0;}
p{margin:0;}
img{max-width:100%;display:block;}
.lead{font-size:clamp(18px,2.2vw,22px);line-height:1.45;color:var(--ink-soft);}
.overline{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-soft);}
a{color:var(--vermilion);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px;}
a:hover{color:var(--vermilion-2);}
::selection{background:var(--vermilion);color:var(--paper);}
:focus-visible{outline:2px solid var(--vermilion);outline-offset:3px;}

.page{max-width:1240px;margin:0 auto;padding:0 clamp(16px,4vw,32px);}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-body);font-size:15px;font-weight:500;padding:12px 20px;border-radius:2px;border:1px solid transparent;cursor:pointer;transition:all 160ms var(--ease);text-decoration:none;white-space:nowrap;}
.btn-primary{background:var(--vermilion);color:var(--paper);}
.btn-primary:hover{background:var(--vermilion-2);color:var(--paper);}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--ink-32);}
.btn-ghost:hover{border-color:var(--ink);background:var(--ink-4);color:var(--ink);}
.btn-lg{padding:14px 26px;font-size:16px;}

.logo-wordmark{display:inline-flex;align-items:baseline;gap:2px;font-family:var(--font-display);font-weight:400;color:var(--ink);line-height:1;letter-spacing:-0.01em;text-decoration:none;}
.logo-wordmark .d{display:inline-block;width:0.18em;height:0.18em;border-radius:999px;background:var(--vermilion);transform:translateY(-0.04em);}
.logo-wordmark.size-md{font-size:28px;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--ink-8);position:sticky;top:0;background:var(--paper);z-index:200;}
.nav-logo{display:inline-flex;flex-shrink:0;}
.nav-center{display:flex;gap:28px;align-items:center;list-style:none;}
.nav-center>li{position:relative;}
.nav-center>li>a,.nav-center>li>span{color:var(--ink);text-decoration:none;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.nav-center>li>a:hover{text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--vermilion);}
.nav-dropdown{position:absolute;top:calc(100% + 12px);left:0;background:var(--paper);border:1px solid var(--ink-12);border-radius:4px;box-shadow:var(--shadow-card);min-width:200px;padding:8px 0;display:none;z-index:300;}
.nav-item-has-dropdown:hover .nav-dropdown{display:block;}
.nav-dropdown a{display:block;padding:10px 20px;font-size:14px;color:var(--ink);text-decoration:none;white-space:nowrap;}
.nav-dropdown a:hover{background:var(--bone);color:var(--vermilion);}
.nav-chevron{font-size:10px;opacity:0.5;transition:transform 160ms var(--ease);}
.nav-item-has-dropdown:hover .nav-chevron{transform:rotate(180deg);}
.nav-coming{position:relative;color:var(--ink-faint);font-size:15px;cursor:default;user-select:none;}
.nav-coming .coming-tooltip{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border-radius:2px;white-space:nowrap;z-index:300;}
.nav-coming:hover{color:var(--ink-soft);}
.nav-coming:hover .coming-tooltip{display:block;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-hamburger{display:none;flex-direction:column;justify-content:space-between;width:24px;height:18px;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;}
.nav-hamburger span{display:block;height:1.5px;background:var(--ink);border-radius:2px;transition:all 240ms var(--ease);}
.nav-hamburger.is-open span:nth-child(1){transform:translateY(8.25px) rotate(45deg);}
.nav-hamburger.is-open span:nth-child(2){opacity:0;}
.nav-hamburger.is-open span:nth-child(3){transform:translateY(-8.25px) rotate(-45deg);}
.nav-drawer{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--paper);z-index:190;padding:80px 24px 40px;overflow-y:auto;flex-direction:column;gap:8px;}
.nav-drawer.is-open{display:flex;}
.nav-drawer-sub{font-family:var(--font-body);font-size:15px;color:var(--ink-soft);text-decoration:none;padding:8px 0 8px 16px;display:block;border-bottom:1px solid var(--ink-4);}
.nav-drawer-sub:hover{color:var(--vermilion);}
.nav-drawer-cta{margin-top:24px;}
.nav-drawer-coming{font-family:var(--font-body);font-size:15px;color:var(--ink-faint);padding:8px 0;border-bottom:1px solid var(--ink-4);display:flex;justify-content:space-between;align-items:center;}
.nav-drawer-coming span{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;background:var(--bone);padding:3px 8px;border-radius:2px;}

/* HERO */
.hero{padding:clamp(48px,8vw,80px) 0 clamp(32px,5vw,48px);}
.hero-overline{font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:clamp(24px,4vw,40px);display:inline-block;padding-bottom:4px;border-bottom:1px solid var(--ink-32);}
.hero-title{font-family:var(--font-display);font-weight:400;font-size:clamp(40px,7vw,112px);line-height:1.0;letter-spacing:-0.015em;margin:0 0 clamp(20px,3vw,28px);max-width:14ch;}
.hero-title em{font-style:italic;color:var(--vermilion);}
.hero-lead{font-size:clamp(17px,2vw,22px);line-height:1.45;color:var(--ink-soft);max-width:52ch;margin-bottom:clamp(28px,4vw,40px);}
.hero-ctas{display:flex;align-items:center;gap:clamp(12px,2vw,24px);flex-wrap:wrap;}
.hero-cta-meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);letter-spacing:0.06em;display:flex;align-items:center;gap:8px;}

/* PAIN */
.pain{padding:clamp(32px,5vw,48px) 0 clamp(48px,7vw,80px);border-top:1px solid var(--ink-8);}
.pain-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,5vw,80px);align-items:start;}
.pain-col-label{font-family:var(--font-display);font-size:clamp(20px,2.5vw,28px);font-weight:400;line-height:1.15;margin-bottom:24px;color:var(--ink);}
.pain-list{list-style:none;}
.pain-list li{padding:14px 0;border-bottom:1px solid var(--ink-8);font-size:15px;color:var(--ink-soft);display:flex;gap:14px;}
.pain-list li:first-child{border-top:1px solid var(--ink-8);}
.pain-dash{color:var(--vermilion);font-family:var(--font-mono);font-size:11px;margin-top:3px;flex-shrink:0;}
.outcome-item{background:var(--bone);padding:18px 22px;margin-bottom:8px;border-left:2px solid var(--vermilion);border-radius:0 4px 4px 0;}
.outcome-item strong{display:block;font-weight:500;font-size:15px;margin-bottom:4px;}
.outcome-item span{font-size:13px;color:var(--ink-faint);}

/* MODULABLE */
.modulable{padding:clamp(28px,4vw,48px) 0;border-top:1px solid var(--ink-8);border-bottom:1px solid var(--ink-8);}
.modulable-inner{display:flex;align-items:center;gap:clamp(20px,4vw,48px);max-width:900px;}
.modulable-icon{flex-shrink:0;width:44px;height:44px;border-radius:4px;background:rgba(200,65,58,0.08);border:1px solid rgba(200,65,58,0.2);display:flex;align-items:center;justify-content:center;color:var(--vermilion);}
.modulable-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-faint);margin-bottom:6px;}
.modulable-body{font-size:clamp(15px,1.8vw,17px);line-height:1.6;color:var(--ink-soft);}
.modulable-body strong{color:var(--ink);font-weight:500;}

/* SEC-HEAD */
.sec-head{max-width:760px;margin:0 auto 48px;text-align:center;}
.sec-head .overline{display:block;margin-bottom:16px;}
.sec-title{font-family:var(--font-display);font-size:clamp(26px,4vw,44px);font-weight:400;line-height:1.1;letter-spacing:-0.01em;color:var(--ink);margin:0 0 16px;}
.sec-head .lead{color:var(--ink-soft);font-size:clamp(16px,1.8vw,18px);margin:0;}
.sec-head .hook{font-size:15px;color:var(--ink);font-style:italic;margin-top:12px;max-width:52ch;margin-left:auto;margin-right:auto;line-height:1.55;}

/* METHODOLOGY */
.methodology{padding:clamp(64px,8vw,128px) 0;border-top:1px solid var(--ink-8);}
.cycle{display:grid;grid-template-columns:1.2fr 1fr;gap:clamp(24px,4vw,48px);align-items:center;}
.cycle-stage{display:flex;justify-content:center;}
.cycle-svg{width:100%;max-width:480px;height:auto;display:block;}
.cycle-legend{display:flex;flex-direction:column;gap:4px;}
.phase-row{display:flex;gap:18px;text-align:left;padding:16px 0;background:transparent;border:none;border-top:1px solid var(--ink-12);cursor:pointer;font-family:var(--font-body);width:100%;transition:all 240ms var(--ease);}
.phase-row:last-child{border-bottom:1px solid var(--ink-12);}
.phase-n{font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);min-width:28px;padding-top:4px;}
.phase-row.is-active .phase-n{color:var(--vermilion);}
.phase-content{display:flex;flex-direction:column;gap:8px;flex:1;}
.phase-title{font-family:var(--font-display);font-size:clamp(20px,2.2vw,26px);line-height:1.15;color:var(--ink);}
.phase-row.is-active .phase-title{color:var(--vermilion);}
.phase-desc{font-size:14px;color:var(--ink-soft);line-height:1.5;}
.phase-out{font-family:var(--font-mono);font-size:11px;color:var(--ink);margin-top:4px;}

/* METHODS */
.methods{padding:clamp(48px,7vw,96px) 0;border-top:1px solid var(--ink-8);}
.methods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.mcard{text-align:left;border-radius:4px;padding:clamp(16px,2vw,24px);border:1px solid;position:relative;transition:box-shadow 240ms var(--ease);}
.mcard:hover{box-shadow:var(--shadow-card);}
.mcard.quanti{background:rgba(65,138,163,0.08);border-color:rgba(65,138,163,0.28);}
.mcard.quali{background:rgba(123,59,110,0.07);border-color:rgba(123,59,110,0.22);}
.mcard-stamp{position:absolute;top:14px;right:14px;font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;}
.mcard.quanti .mcard-stamp{background:rgba(65,138,163,0.18);color:var(--asagi);}
.mcard.quali .mcard-stamp{background:rgba(123,59,110,0.15);color:var(--shikon);}
.mcard-n{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;opacity:0.5;margin-bottom:16px;}
.mcard.quanti .mcard-n{color:var(--asagi);}
.mcard.quali .mcard-n{color:var(--shikon);}
.mcard-title{font-family:var(--font-display);font-size:clamp(18px,1.8vw,22px);line-height:1.1;margin-bottom:8px;color:var(--ink);}
.mcard-desc{font-size:13px;line-height:1.5;}
.mcard.quanti .mcard-desc{color:var(--asagi);}
.mcard.quali .mcard-desc{color:var(--shikon);opacity:0.85;}

/* REC STACK */
.rec-wrap{padding:clamp(64px,8vw,128px) 0;border-top:1px solid var(--ink-8);}
.rec-stage{display:grid;grid-template-columns:1fr auto;gap:clamp(24px,4vw,48px);align-items:start;max-width:1100px;margin:0 auto;}
.rec-deck{position:relative;width:100%;max-width:580px;min-height:580px;justify-self:center;}
.rec-card{position:absolute;inset:0;text-align:left;background:var(--paper);border:1px solid var(--ink-12);border-radius:8px;padding:clamp(20px,3vw,28px);cursor:pointer;transition:transform 400ms var(--ease),box-shadow 240ms var(--ease),border-color 240ms var(--ease);transform-origin:center top;box-shadow:0 1px 0 rgba(27,42,58,.04),0 16px 40px -20px rgba(27,42,58,.15);display:flex;flex-direction:column;gap:12px;min-height:580px;font-family:var(--font-body);}
.rec-card.is-front{cursor:default;border-color:var(--ink-32);box-shadow:0 2px 0 rgba(27,42,58,.06),0 28px 56px -24px rgba(27,42,58,.28);}
.rec-card:not(.is-front):hover{border-color:var(--ink-32);}
.rec-top{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:12px;}
.rec-n{color:var(--ink-soft);letter-spacing:0.08em;}
.rec-imp{display:inline-flex;align-items:center;gap:4px;}
.rec-imp-dot{width:5px;height:5px;border-radius:999px;display:inline-block;}
.rec-imp-lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;margin-left:6px;font-weight:500;}
.rec-title{font-family:var(--font-display);font-weight:400;font-size:clamp(20px,2vw,26px);line-height:1.15;letter-spacing:-0.01em;margin:0 0 4px;}
.rec-desc{color:var(--ink-soft);font-size:14px;line-height:1.5;margin:0;}
.rec-schema{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;padding:14px 0;border-top:1px solid var(--ink-8);}
.rec-schema dt{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-soft);align-self:center;}
.rec-schema dd{margin:0;}
.rec-research{display:flex;gap:5px;flex-wrap:wrap;}
.rec-pill{display:inline-block;font-family:var(--font-body);font-size:11px;font-weight:500;padding:3px 9px;border-radius:3px;line-height:1.3;}
.rec-foot{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--ink-8);margin-top:auto;}
.rec-ice{display:flex;gap:12px;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.08em;}
.rec-ice strong{color:var(--ink);font-weight:500;margin-left:2px;}
.rec-score{color:var(--vermilion)!important;}
.rec-cta{font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--ink);}
.rec-card.is-front .rec-cta{color:var(--vermilion);}
.rec-indicator{display:flex;flex-direction:column;gap:4px;border-left:1px solid var(--ink-12);padding-left:16px;}
.rec-dot{background:transparent;border:none;padding:8px 0;font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);letter-spacing:0.1em;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:color 160ms var(--ease);}
.rec-dot-bullet{display:inline-block;width:6px;height:6px;border-radius:999px;background:var(--ink-12);transition:all 160ms var(--ease);flex-shrink:0;}
.rec-dot:hover{color:var(--ink);}
.rec-dot.on{color:var(--vermilion);}
.rec-dot.on .rec-dot-bullet{background:var(--vermilion);width:8px;height:8px;}

/* TEAM */
.team{padding:clamp(48px,7vw,96px) 0;border-top:1px solid var(--ink-8);}
.team-sec-title{font-family:var(--font-display);font-size:clamp(26px,4vw,44px);font-weight:400;line-height:1.1;letter-spacing:-0.01em;margin:16px 0 12px;color:var(--ink);}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px;margin-top:40px;}
.team-card{background:var(--bone);padding:clamp(20px,3vw,32px) clamp(18px,2.5vw,28px);border-radius:4px;border:1px solid var(--ink-8);border-top:3px solid var(--ink-12);transition:border-top-color 160ms var(--ease),box-shadow 160ms var(--ease);}
.team-card:hover{border-top-color:var(--vermilion);box-shadow:var(--shadow-card);}
.team-role{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-faint);margin-bottom:10px;}
.team-name{font-family:var(--font-display);font-size:clamp(22px,2.5vw,28px);font-weight:400;margin-bottom:12px;line-height:1.1;}
.team-desc{font-size:14px;color:var(--ink-soft);line-height:1.55;margin-bottom:16px;}
.team-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.team-tag{font-family:var(--font-mono);font-size:10px;padding:4px 10px;background:var(--paper);color:var(--ink-soft);border-radius:2px;}
.team-link{font-size:13px;color:var(--vermilion);text-decoration:none;}
.team-link:hover{text-decoration:underline;}
.double-regard{margin-top:32px;padding:clamp(20px,3vw,32px) clamp(20px,3vw,36px);background:var(--ink);color:var(--paper);max-width:900px;border-radius:4px;}
.double-regard-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:rgba(244,237,224,0.4);margin-bottom:16px;}
.double-regard-item{margin-bottom:14px;font-size:14px;line-height:1.65;color:rgba(244,237,224,0.75);padding-left:18px;position:relative;}
.double-regard-item::before{content:'—';position:absolute;left:0;color:rgba(244,237,224,0.35);}
.double-regard-conclusion{margin-top:20px;padding-top:16px;border-top:1px solid rgba(244,237,224,0.12);font-size:11px;color:rgba(244,237,224,0.55);font-family:var(--font-mono);letter-spacing:0.04em;}

/* BOOKING */
.booking{padding:clamp(48px,7vw,96px) 0;border-top:1px solid var(--ink-8);}
.booking-inner{display:grid;grid-template-columns:1fr 1.4fr;gap:clamp(32px,5vw,80px);align-items:start;}
.book-left h3{font-family:var(--font-display);font-size:clamp(28px,3.5vw,48px);line-height:1.05;margin:12px 0 18px;letter-spacing:-0.01em;}
.book-left .lead{color:var(--ink-soft);font-size:clamp(16px,1.8vw,18px);margin-bottom:28px;}
.book-points{list-style:none;padding:0;margin:0;}
.book-points li{padding:13px 0;border-top:1px solid var(--ink-12);font-size:15px;position:relative;padding-left:22px;}
.book-points li::before{content:'→';position:absolute;left:0;color:var(--vermilion);}
.book-points li:last-child{border-bottom:1px solid var(--ink-12);}
.calendly-wrap{background:var(--bone);border:1px solid var(--ink-8);border-radius:4px;overflow:hidden;min-height:500px;display:flex;flex-direction:column;}
.calendly-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;text-align:center;flex:1;gap:16px;}
.calendly-placeholder-icon{width:56px;height:56px;border-radius:8px;background:var(--paper);border:1px solid var(--ink-8);display:flex;align-items:center;justify-content:center;color:var(--vermilion);}
.calendly-placeholder h4{font-family:var(--font-display);font-size:22px;font-weight:400;color:var(--ink);}
.calendly-placeholder p{font-size:14px;color:var(--ink-soft);max-width:28ch;line-height:1.5;}
.calendly-placeholder .btn{margin-top:8px;}
.calendly-note{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:0.08em;text-transform:uppercase;padding:12px 20px;border-top:1px solid var(--ink-8);text-align:center;}

/* FOOTER */
.footer{padding:clamp(40px,5vw,64px) 0 32px;border-top:1px solid var(--ink-8);margin-top:clamp(48px,7vw,96px);display:grid;grid-template-columns:1.5fr 2fr;gap:clamp(32px,5vw,64px);}
.foot-left p{margin-top:12px;color:var(--ink-soft);max-width:32ch;font-size:14px;}
.foot-origin{margin-top:18px;padding-top:18px;border-top:1px solid var(--ink-8);font-size:13px;color:var(--ink-faint);line-height:1.6;font-style:italic;max-width:30ch;}
.foot-cols{display:grid;grid-template-columns:1fr 1fr;gap:28px;}
.foot-cols h6{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-faint);margin-bottom:12px;}
.foot-cols a{display:block;color:var(--ink);text-decoration:none;font-size:14px;margin-bottom:8px;}
.foot-cols a:hover{color:var(--vermilion);}
.foot-base{grid-column:1/-1;margin-top:32px;padding-top:16px;border-top:1px solid var(--ink-8);color:var(--ink-faint);font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;}

/* RESPONSIVE */
@media(max-width:900px){
  .nav-center,.nav-right .btn{display:none;}
  .nav-hamburger{display:flex;}
  .pain-grid{grid-template-columns:1fr;gap:40px;}
  .cycle{grid-template-columns:1fr;gap:32px;}
  .cycle-svg{max-width:360px;margin:0 auto;}
  .rec-stage{grid-template-columns:1fr;gap:20px;}
  .rec-deck{min-height:520px;}
  .rec-indicator{flex-direction:row;border-left:none;border-top:1px solid var(--ink-12);padding-left:0;padding-top:16px;justify-content:center;flex-wrap:wrap;}
  .team-grid{grid-template-columns:1fr;}
  .booking-inner{grid-template-columns:1fr;gap:40px;}
  .footer{grid-template-columns:1fr;gap:32px;}
  .modulable-inner{flex-direction:column;gap:20px;align-items:flex-start;}
}
@media(max-width:768px){
  .methods-grid{grid-template-columns:1fr 1fr;}
  .sec-head{margin-bottom:32px;}
  .foot-cols{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .methods-grid{grid-template-columns:1fr;}
  .hero-ctas{flex-direction:column;align-items:flex-start;gap:12px;}
  .foot-cols{grid-template-columns:1fr;}
  .rec-deck{min-height:600px;}
  .rec-schema{grid-template-columns:auto 1fr;gap:6px 12px;}
}
@media(max-width:480px){
  .hero-title{font-size:clamp(34px,10vw,48px);}
  .pain-col-label{font-size:20px;}
  .double-regard{padding:20px 18px;}
  .team-card{padding:18px 16px;}
  .rec-card{padding:18px 16px;}
  .calendly-placeholder{padding:32px 20px;}
}
</style>
</head>
<body>
<div class="page" id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

function Logo({size='md'}) {
  return (
    <span className={`logo-wordmark size-${size}`}>
      <span className="w">nexe</span><span className="d" aria-hidden="true"></span>
    </span>
  );
}

function Nav() {
  const [open, setOpen] = useState(false);
  return (
    <>
      <nav className="nav">
        <a href="#" className="nav-logo"><Logo size="md"/></a>
        <ul className="nav-center">
          <li className="nav-item-has-dropdown">
            <span>Audit CRO <span className="nav-chevron">▾</span></span>
            <div className="nav-dropdown">
              <a href="#methodology">Notre démarche</a>
              <a href="#methods">Les méthodes</a>
              <a href="#equipe">Collaboration</a>
            </div>
          </li>
          <li>
            <span className="nav-coming">
              Brand × Performance
              <span className="coming-tooltip">À venir</span>
            </span>
          </li>
        </ul>
        <div className="nav-right">
          <a href="#book" className="btn btn-primary">Réserver un call</a>
          <button className={'nav-hamburger'+(open?' is-open':'')} onClick={()=>setOpen(!open)} aria-label="Menu">
            <span/><span/><span/>
          </button>
        </div>
      </nav>
      <div className={'nav-drawer'+(open?' is-open':'')} onClick={()=>setOpen(false)}>
        <span style={{fontFamily:'var(--font-display)',fontSize:'13px',color:'var(--ink-faint)',letterSpacing:'0.1em',textTransform:'uppercase',padding:'12px 0',borderBottom:'1px solid var(--ink-8)',display:'block'}}>Audit CRO</span>
        <a href="#methodology" className="nav-drawer-sub" onClick={()=>setOpen(false)}>Notre démarche</a>
        <a href="#methods" className="nav-drawer-sub" onClick={()=>setOpen(false)}>Les méthodes</a>
        <a href="#equipe" className="nav-drawer-sub" onClick={()=>setOpen(false)}>Collaboration</a>
        <div className="nav-drawer-coming">Brand × Performance <span>À venir</span></div>
        <div className="nav-drawer-cta">
          <a href="#book" className="btn btn-primary btn-lg" onClick={()=>setOpen(false)}>Réserver un call</a>
        </div>
      </div>
    </>
  );
}

function Hero() {
  return (
    <section className="hero">
      <div className="hero-overline">№ Audit CRO · 2026</div>
      <h1 className="hero-title">
        Votre trafic ne manque pas.<br/>
        <em>Vos conversions, si.</em>
      </h1>
      <p className="hero-lead">
        Freins identifiés. Actions priorisées. Pas d'interprétation — des faits, un plan.
      </p>
      <div className="hero-ctas">
        <a href="#book" className="btn btn-primary">Réserver un call</a>
        <div className="hero-cta-meta">
          <span>sans engagement</span>
          <span style={{opacity:0.4}}>·</span>
          <span>30 minutes</span>
        </div>
      </div>
    </section>
  );
}

function Pain() {
  return (
    <section className="pain">
      <div className="pain-grid">
        <div>
          <p className="pain-col-label">Votre site génère du trafic.<br/>Mais pas assez de revenus.</p>
          <ul className="pain-list">
            <li><span className="pain-dash">—</span><span>Vous avez créé votre site et souhaitez vous assurer qu'il est optimisé pour convertir — avant d'investir davantage en acquisition.</span></li>
            <li><span className="pain-dash">—</span><span>Vos campagnes ramènent du monde, mais le taux de conversion stagne.</span></li>
            <li><span className="pain-dash">—</span><span>Vous ne savez pas exactement où ni pourquoi vous perdez vos visiteurs.</span></li>
            <li><span className="pain-dash">—</span><span>Vos équipes ont des hypothèses, mais rien de priorisé ni de testé.</span></li>
            <li><span className="pain-dash">—</span><span>Vous optimisez dans le vide, sans cadre pour mesurer ce qui fonctionne vraiment.</span></li>
            <li><span className="pain-dash">—</span><span>Vous êtes une équipe réduite et ne savez pas par où commencer pour obtenir plus de ventes ou de leads.</span></li>
          </ul>
        </div>
        <div>
          <p className="pain-col-label">Ce que vous obtenez<br/>à l'issue de l'audit.</p>
          <div className="outcome-item"><strong>Une lecture claire de votre conversion</strong><span>Ce que vos données montrent, ce que vos utilisateurs font, et ce que votre business implique — enfin reliés.</span></div>
          <div className="outcome-item"><strong>Des décisions concrètes à activer</strong><span>Vous savez quoi faire, dans quel ordre, et pourquoi.</span></div>
          <div className="outcome-item"><strong>Des pistes directement exploitables</strong><span>Chaque recommandation est pensée pour être testée, mesurée et déployée.</span></div>
          <div className="outcome-item"><strong>Une projection concrète des améliorations</strong><span>Des solutions tangibles pour visualiser ce que votre site pourrait devenir.</span></div>
        </div>
      </div>
    </section>
  );
}

function Modulable() {
  return (
    <section className="modulable">
      <div className="modulable-inner">
        <div className="modulable-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 3v18M3 12h18"/><circle cx="12" cy="12" r="9"/>
          </svg>
        </div>
        <div>
          <div className="modulable-label">Audit modulable</div>
          <p className="modulable-body"><strong>Pas un format unique.</strong> On construit l'audit avec vous — en choisissant les méthodes qui ont le plus de sens pour votre situation, votre budget, vos objectifs.</p>
        </div>
      </div>
    </section>
  );
}

const CX=320,CY=320,R_OUTER=240,R_INNER=180,ICON_R=210;
const polar=(deg,r)=>{const rad=(deg-90)*Math.PI/180;return[CX+r*Math.cos(rad),CY+r*Math.sin(rad)];};
const arcPath=(s,e,rO,rI)=>{
  const[x1o,y1o]=polar(s,rO),[x2o,y2o]=polar(e,rO),[x2i,y2i]=polar(e,rI),[x1i,y1i]=polar(s,rI);
  const large=(e-s)>180?1:0;
  return `M ${x1o} ${y1o} A ${rO} ${rO} 0 ${large} 1 ${x2o} ${y2o} L ${x2i} ${y2i} A ${rI} ${rI} 0 ${large} 0 ${x1i} ${y1i} Z`;
};
const PHASES=[
  {n:'01',fr:'Lecture business',desc:'Comprendre votre contexte, vos objectifs, vos personas, leurs besoins et leurs contraintes réelles.',output:'Poser le bon cadre d\'analyse'},
  {n:'02',fr:'Recherche, Hypothèses & Insights',desc:'Recherche user basée sur des méthodes qualitatives et quantitatives croisées.',output:'Backlog d\'insights sourcés et structurés'},
  {n:'03',fr:'Priorisation des actions',desc:'Croiser les hypothèses business avec les insights pour faire émerger les leviers les plus pertinents.',output:'Backlog priorisé — impact, confiance, effort'},
  {n:'04',fr:'Conversion Redesign',desc:'Mise en production des variantes les plus prometteuses — A/B tests ou refontes ciblées selon les reco.',output:'Une approche orientée clarté, fluidité et performance'},
];
const SEG_COLORS=['#C8413A','#418AA3','#7B3B6E','#7A8F7A'];
const ICONS_SVG={
  '01':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 3h8l4 4v14H7z"/><path d="M15 3v4h4"/><circle cx="12" cy="14" r="2.5"/><path d="m14 16 2 2"/></g>,
  '02':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="6"/><path d="m19.5 19.5-3.5-3.5"/><path d="M8 13v-2M11 13V9M14 13v-3"/></g>,
  '03':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="14" height="4" rx="1"/><rect x="3" y="16" width="10" height="4" rx="1"/></g>,
  '04':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3v4l-4 8a4 4 0 0 0 4 5h6a4 4 0 0 0 4-5l-4-8V3"/><path d="M9 3h6"/><path d="M7 14h10"/></g>,
};

function MethodologyCycle() {
  const[active,setActive]=useState(0);
  const seg=360/PHASES.length,gap=3;
  return (
    <div className="cycle">
      <div className="cycle-stage">
        <svg viewBox="0 0 640 640" className="cycle-svg">
          {PHASES.map((p,i)=>{
            const start=i*seg+gap/2,end=(i+1)*seg-gap/2,isActive=i===active;
            return <path key={p.n} d={arcPath(start,end,R_OUTER,R_INNER)} fill={isActive?'var(--vermilion)':SEG_COLORS[i]} opacity={isActive?1:0.72} style={{cursor:'pointer',transition:'fill 240ms var(--ease),opacity 240ms var(--ease)'}} onClick={()=>setActive(i)}/>;
          })}
          {PHASES.map((p,i)=>{
            const midDeg=i*seg+seg/2,[x,y]=polar(midDeg,ICON_R),isActive=i===active;
            return (
              <g key={p.n+'-icon'} transform={`translate(${x-26},${y-26})`} style={{cursor:'pointer'}} onClick={()=>setActive(i)}>
                <circle cx="26" cy="26" r="26" fill="var(--paper)" stroke={isActive?'var(--vermilion)':'var(--ink)'} strokeWidth="1.25"/>
                <g transform="translate(14,14)" style={{color:isActive?'var(--vermilion)':'var(--ink)'}}>{ICONS_SVG[p.n]}</g>
              </g>
            );
          })}
          <g textAnchor="middle">
            <text x={CX} y={CY+14} fontFamily="var(--font-display)" fontSize="52" fill="var(--ink)" letterSpacing="-0.5">Démarche</text>
            <text x={CX} y={CY+58} fontFamily="var(--font-display)" fontSize="52" fill="var(--vermilion)" fontStyle="italic">CRO.</text>
            <text x={CX} y={CY+92} fontFamily="var(--font-body)" fontSize="13" fill="var(--ink-soft)">Business · Utilisateurs · Données</text>
          </g>
        </svg>
      </div>
      <div className="cycle-legend">
        {PHASES.map((p,i)=>(
          <button key={p.n} className={'phase-row'+(i===active?' is-active':'')} onClick={()=>setActive(i)}>
            <span className="phase-n">{p.n}</span>
            <span className="phase-content">
              <span className="phase-title">{p.fr}</span>
              {i===active&&<><span className="phase-desc">{p.desc}</span><span className="phase-out">→ {p.output}</span></>}
            </span>
          </button>
        ))}
      </div>
    </div>
  );
}

function Methodology() {
  return (
    <section className="methodology" id="methodology">
      <div className="sec-head">
        <span className="overline">Notre démarche</span>
        <h3 className="sec-title">Comprendre. Croiser.<br/>Prioriser. Agir.</h3>
        <p className="lead">Une approche qui relie ce que vous savez… à ce que font réellement vos utilisateurs.</p>
        <p className="hook">On ne regarde pas seulement ce qui ne marche pas : on comprend pourquoi ça ne marche pas dans votre business.</p>
      </div>
      <MethodologyCycle/>
    </section>
  );
}

const METHODES=[
  {type:'quanti',stamp:'Quanti',n:'01',title:'Analytics',desc:'Review du tracking, identification des pages/produits et parcours qui convertissent — et ceux qui saignent, détection des segments qui tirent la croissance...'},
  {type:'quali',stamp:'Quali',n:'02',title:'Heatmaps & Sessions recordings',desc:'Comportements réels. Ce que les utilisateurs regardent, cliquent, ignorent — ou abandonnent.'},
  {type:'quali',stamp:'Quali',n:'03',title:'Sondages onsite',desc:'Hésitations et motivations en amont et après la décision. Ce que la data ne peut pas dire.'},
  {type:'quali',stamp:'Quali',n:'04',title:'Interviews clients',desc:'Expérience d\'achat et vécu. Pour comprendre le pourquoi derrière les comportements observés.'},
  {type:'quali',stamp:'Quali',n:'05',title:'Tests utilisateurs',desc:'Compréhension du site et frictions en situation réelle. On observe, on ne devine pas.'},
  {type:'quali',stamp:'Quali',n:'06',title:'Évaluation heuristique',desc:'Audit des bonnes pratiques UX et sectorielles. Ce que l\'œil expert repère avant même les données.'},
];

function Methods() {
  return (
    <section className="methods" id="methods">
      <div className="sec-head">
        <span className="overline">Ce que nous faisons</span>
        <h3 className="sec-title">Les méthodes qui alimentent<br/>cette démarche.</h3>
        <p className="lead">Chaque analyse s'appuie sur des méthodes complémentaires — quantitatives et qualitatives.</p>
      </div>
      <div className="methods-grid">
        {METHODES.map(m=>(
          <div key={m.n} className={`mcard ${m.type}`}>
            <span className="mcard-stamp">{m.stamp}</span>
            <div className="mcard-n">{m.n}</div>
            <div className="mcard-title">{m.title}</div>
            <div className="mcard-desc">{m.desc}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

const TAG={
  place:{bg:'rgba(200,65,58,0.10)',fg:'#8A2E29'},
  cat:{bg:'rgba(27,42,58,0.08)',fg:'#1B2A3A'},
  theme:{bg:'rgba(122,143,122,0.20)',fg:'#3F5340'},
  action:{bg:'rgba(196,154,62,0.22)',fg:'#6E5620'},
  research:{bg:'rgba(27,42,58,0.05)',fg:'#4A5A6E'},
};
const IMPORTANCE={
  5:{label:'Critique',color:'#C8413A'},4:{label:'Élevée',color:'#C8413A'},
  3:{label:'Moyenne',color:'#C49A3E'},2:{label:'Basse',color:'#7A8F7A'},
};
const RECS=[
  {n:'01',title:'Retirer les champs « société » et « TVA » de l\'étape 3',importance:5,ice:{i:9,c:8,e:2},place:'Checkout',cat:'Utilisabilité',theme:'Effort',action:'Modification directe',research:['Analytics','Sessions recordings'],desc:'Seulement 8% des clients remplissent ces champs. Drop-off de 34% sur l\'étape 3.',cta:'Livrer'},
  {n:'02',title:'Remonter les avis clients au-dessus du fold sur la fiche produit',importance:4,ice:{i:8,c:9,e:3},place:'Fiche produit',cat:'Confiance',theme:'Clarté',action:'Modification directe',research:['Heatmaps','Sessions recordings'],desc:'73% des visiteurs ne scrollent pas jusqu\'aux avis. Pattern de sortie avant ajout au panier.',cta:'Livrer'},
  {n:'03',title:'Reformuler le hero autour du résultat client, pas du produit',importance:4,ice:{i:7,c:6,e:2},place:'Homepage',cat:'Motivation',theme:'Message',action:'Test A/B',research:['Interviews clients','Évaluation heuristique'],desc:'Les interviews révèlent que la promesse principale n\'est pas comprise avant la 3ème page visitée.',cta:'Tester'},
  {n:'04',title:'Comprendre pourquoi le taux de retour est 2× la moyenne secteur',importance:3,ice:{i:6,c:7,e:4},place:'Post-achat',cat:'Compréhension',theme:'Friction',action:'Recherche',research:['Tests utilisateurs','Analytics'],desc:'Signal fort dans les données, cause inconnue. À investiguer via tests utilisateurs.',cta:'Investiguer'},
  {n:'05',title:'Ajouter la preuve sociale dans le flow, pas en bas de page',importance:3,ice:{i:5,c:7,e:2},place:'Checkout',cat:'Confiance',theme:'Crédibilité',action:'Modification directe',research:['Tests utilisateurs','Sessions recordings'],desc:'Avis clients enfouis en footer. Repositionnement inline pendant l\'ajout au panier.',cta:'Livrer'},
  {n:'06',title:'Tester un pricing en 3 tiers avec ancrage sur l\'offre premium',importance:2,ice:{i:4,c:9,e:3},place:'Pricing',cat:'Motivation',theme:'Ancrage',action:'Test A/B',research:['Sondages onsite','Analytics'],desc:'Hésitation forte sur le rapport qualité/prix. Un tier premium visible redirige vers l\'offre principale.',cta:'Tester'},
];

function Pill({kind,children}){const s=TAG[kind]||TAG.cat;return <span className="rec-pill" style={{background:s.bg,color:s.fg}}>{children}</span>;}
function ImpDots({level}){
  const color=IMPORTANCE[level]?.color||'#8A95A2';
  return <span className="rec-imp">{[1,2,3,4,5].map(i=><span key={i} className="rec-imp-dot" style={{background:i<=level?color:'rgba(27,42,58,0.12)'}}></span>)}<span className="rec-imp-lbl" style={{color}}>{IMPORTANCE[level]?.label}</span></span>;
}

function RecommendationStack(){
  const[order,setOrder]=useState([0,1,2,3,4,5]);
  const bringToFront=(idx)=>setOrder(prev=>[idx,...prev.filter(i=>i!==idx)]);
  return (
    <div className="rec-wrap" id="recos">
      <div className="sec-head">
        <span className="overline">Ce que nous livrons</span>
        <h3 className="sec-title">De l'insight à l'action.</h3>
        <p className="lead">Chaque recommandation est structurée, priorisée et mise en perspective — pour passer de l'insight à des décisions claires et des actions concrètes.</p>
      </div>
      <div className="rec-stage">
        <div className="rec-deck">
          {order.map((idx,pos)=>{
            const r=RECS[idx],isFront=pos===0;
            const offset=pos*14,shift=pos*16,scale=1-pos*0.035,rot=pos*-1.2;
            return (
              <button key={r.n} className={'rec-card'+(isFront?' is-front':'')}
                style={{transform:`translate(${shift}px,${offset}px) scale(${scale}) rotate(${rot}deg)`,zIndex:RECS.length-pos,opacity:pos>4?0:1}}
                onClick={()=>!isFront&&bringToFront(idx)} tabIndex={isFront?0:-1}
              >
                <header className="rec-top"><span className="rec-n">№ {r.n}</span><ImpDots level={r.importance}/></header>
                <h4 className="rec-title">{r.title}</h4>
                <p className="rec-desc">{r.desc}</p>
                <dl className="rec-schema">
                  <dt>Emplacement</dt><dd><Pill kind="place">{r.place}</Pill></dd>
                  <dt>Catégorie</dt><dd><Pill kind="cat">{r.cat}</Pill></dd>
                  <dt>Thème</dt><dd><Pill kind="theme">{r.theme}</Pill></dd>
                  <dt>Type d'action</dt><dd><Pill kind="action">{r.action}</Pill></dd>
                  <dt>Recherche</dt><dd className="rec-research">{r.research.map(x=><Pill key={x} kind="research">{x}</Pill>)}</dd>
                </dl>
                <footer className="rec-foot">
                  <div className="rec-ice"><span>I <strong>{r.ice.i}</strong></span><span>C <strong>{r.ice.c}</strong></span><span>E <strong>{r.ice.e}</strong></span><span className="rec-score">ICE {(r.ice.i*r.ice.c/r.ice.e).toFixed(1)}</span></div>
                  <span className="rec-cta">{r.cta} →</span>
                </footer>
              </button>
            );
          })}
        </div>
        <div className="rec-indicator">
          {order.map((idx,pos)=>{
            const isActive=pos===0;
            return (
              <button key={idx} className={'rec-dot'+(isActive?' on':'')} onClick={()=>bringToFront(idx)}>
                <span className="rec-dot-bullet"></span>
                <span style={{color:isActive?'var(--vermilion)':'var(--ink-faint)',transition:'color 160ms var(--ease)'}}>{RECS[idx].n}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Team(){
  return (
    <section className="team" id="equipe">
      <span className="overline">Qui sommes-nous</span>
      <h2 className="team-sec-title">Un audit fait en binôme.<br/>Un double regard.</h2>
      <p className="lead" style={{maxWidth:'560px',marginTop:'4px'}}>L'audit CRO gagne en profondeur quand deux expertises complémentaires se croisent sur le même funnel.</p>
      <div className="team-grid">
        <div className="team-card">
          <div className="team-role">Growth &amp; Acquisition · CRO</div>
          <div className="team-name">Anne-Sophie Roux</div>
          <div className="team-desc">Une lecture CRO du funnel depuis l'acquisition. Une vision transversale et data qui relie business, message, campagnes et parcours.</div>
