<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Nexe · Audit CRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --paper:#F4EDE0; --paper-2:#EFE6D4; --bone:#E8DFCE;
  --ink:#1B2A3A; --ink-soft:#4A5A6E; --ink-faint:#8A95A2; --charcoal:#0E1620;
  --vermilion:#C8413A; --vermilion-2:#A83530;
  --sage:#7A8F7A; --ochre:#C49A3E;
  --asagi:#418AA3; --shikon:#7B3B6E;
  --ink-4:rgba(27,42,58,0.04); --ink-8:rgba(27,42,58,0.08);
  --ink-12:rgba(27,42,58,0.12); --ink-32:rgba(27,42,58,0.32);
  --font-display:'Instrument Serif','Times New Roman',Georgia,serif;
  --font-body:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace;
  --fs-display-xl:clamp(56px,8vw,112px);
  --fs-display-l:clamp(44px,6vw,72px);
  --fs-display-m:clamp(32px,4vw,48px);
  --fs-display-s:clamp(24px,3vw,32px);
  --fs-lead:22px; --fs-body:17px; --fs-ui:15px; --fs-small:13px; --fs-micro:11px;
  --lh-display:1.02; --lh-body:1.55;
  --ls-display:-0.01em; --ls-overline:0.12em;
  --shadow-card:0 1px 0 rgba(27,42,58,.06),0 12px 32px -16px rgba(27,42,58,.18);
  --ease:cubic-bezier(0.2,0.6,0.2,1);
  --t-fast:160ms; --t-med:240ms; --t-slow:400ms;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:var(--fs-body);line-height:var(--lh-body);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4,h5,h6{font-family:var(--font-display);font-weight:400;letter-spacing:var(--ls-display);line-height:var(--lh-display);color:var(--ink);margin:0;}
h1{font-size:var(--fs-display-xl);}h2{font-size:var(--fs-display-l);}h3{font-size:var(--fs-display-m);}h4{font-size:var(--fs-display-s);}
p{margin:0;}
.lead{font-size:var(--fs-lead);line-height:1.45;color:var(--ink-soft);}
.overline{font-family:var(--font-mono);font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:var(--ls-overline);color:var(--ink-soft);}
a{color:var(--vermilion);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px;transition:color var(--t-fast) var(--ease);}
a:hover{color:var(--vermilion-2);}
::selection{background:var(--vermilion);color:var(--paper);}
:focus-visible{outline:2px solid var(--vermilion);outline-offset:3px;}

.page{max-width:1240px;margin:0 auto;padding:0 32px;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-body);font-size:15px;font-weight:500;padding:12px 20px;border-radius:2px;border:1px solid transparent;cursor:pointer;transition:all 160ms var(--ease);text-decoration:none;}
.btn-primary{background:var(--vermilion);color:var(--paper);}
.btn-primary:hover{background:var(--vermilion-2);color:var(--paper);}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--ink-32);}
.btn-ghost:hover{border-color:var(--ink);background:var(--ink-4);color:var(--ink);}
.btn-lg{padding:14px 26px;font-size:16px;}

.logo-wordmark{display:inline-flex;align-items:baseline;gap:2px;font-family:var(--font-display);font-weight:400;color:var(--ink);line-height:1;letter-spacing:-0.01em;text-decoration:none;}
.logo-wordmark .w{font-size:1em;}
.logo-wordmark .d{display:inline-block;width:0.18em;height:0.18em;border-radius:999px;background:var(--vermilion);transform:translateY(-0.04em);}
.logo-wordmark.size-md{font-size:28px;}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--ink-8);position:sticky;top:0;background:var(--paper);z-index:100;}
.nav-logo{display:inline-flex;}
.nav-links{display:flex;gap:32px;align-items:center;}
.nav-links a{color:var(--ink);text-decoration:none;font-size:15px;}
.nav-links a:hover{text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--vermilion);}
.nav-coming{position:relative;color:var(--ink-faint);font-size:15px;cursor:default;user-select:none;}
.nav-coming .coming-tooltip{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border-radius:2px;white-space:nowrap;z-index:200;}
.nav-coming:hover{color:var(--ink-soft);}
.nav-coming:hover .coming-tooltip{display:block;}

/* Hero */
.hero{padding:96px 0;}
.hero-overline{font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:40px;display:inline-block;padding-bottom:4px;border-bottom:1px solid var(--ink-32);}
.hero-title{font-family:var(--font-display);font-weight:400;font-size:clamp(56px,8vw,112px);line-height:1.0;letter-spacing:-0.015em;margin:0 0 32px;max-width:14ch;}
.hero-title em{font-style:italic;color:var(--vermilion);}
.hero-lead{font-size:22px;line-height:1.45;color:var(--ink-soft);max-width:56ch;margin-bottom:48px;}
.hero-ctas{display:flex;gap:12px;}

/* Pain */
.pain{padding:96px 0;border-top:1px solid var(--ink-8);}
.pain-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;margin-top:48px;align-items:start;}
.pain-col-label{font-family:var(--font-display);font-size:clamp(24px,3vw,32px);font-weight:400;line-height:1.15;margin-bottom:24px;}
.pain-list{list-style:none;}
.pain-list li{padding:16px 0;border-bottom:1px solid var(--ink-8);font-size:15px;color:var(--ink-soft);display:flex;gap:14px;}
.pain-list li:first-child{border-top:1px solid var(--ink-8);}
.pain-dash{color:var(--vermilion);font-family:var(--font-mono);font-size:11px;margin-top:3px;flex-shrink:0;}
.outcome-item{background:var(--bone);padding:20px 24px;margin-bottom:8px;border-left:2px solid var(--vermilion);border-radius:0 4px 4px 0;}
.outcome-item strong{display:block;font-weight:500;font-size:15px;margin-bottom:4px;}
.outcome-item span{font-size:13px;color:var(--ink-faint);}

/* Sec head */
.sec-head{max-width:760px;margin:0 auto 64px;text-align:center;}
.sec-head .overline{display:inline-block;margin-bottom:20px;}
.sec-head h3{font-family:var(--font-display);font-size:clamp(32px,4vw,44px);line-height:1.1;letter-spacing:-0.01em;margin:0 0 16px;}
.sec-head .lead{color:var(--ink-soft);font-size:18px;margin:0;}
.sec-head .hook{font-size:16px;color:var(--ink);font-style:italic;margin-top:12px;max-width:52ch;margin-left:auto;margin-right:auto;line-height:1.55;}

/* Methodology */
.methodology{padding:128px 0;border-top:1px solid var(--ink-8);}
.cycle{display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:center;}
.cycle-stage{display:flex;justify-content:center;}
.cycle-svg{width:100%;max-width:560px;height:auto;display:block;}
.cycle-legend{display:flex;flex-direction:column;gap:4px;}
.phase-row{display:flex;gap:18px;text-align:left;padding:18px 0;background:transparent;border:none;border-top:1px solid var(--ink-12);cursor:pointer;font-family:var(--font-body);width:100%;transition:all 240ms var(--ease);}
.phase-row:last-child{border-bottom:1px solid var(--ink-12);}
.phase-n{font-family:var(--font-mono);font-size:13px;color:var(--ink-faint);min-width:32px;padding-top:4px;}
.phase-row.is-active .phase-n{color:var(--vermilion);}
.phase-content{display:flex;flex-direction:column;gap:8px;flex:1;}
.phase-title{font-family:var(--font-display);font-size:26px;line-height:1.15;color:var(--ink);}
.phase-row.is-active .phase-title{color:var(--vermilion);}
.phase-desc{font-size:15px;color:var(--ink-soft);line-height:1.5;}
.phase-out{font-family:var(--font-mono);font-size:12px;color:var(--ink);margin-top:4px;}

/* Methods */
.methods{padding:96px 0;border-top:1px solid var(--ink-8);}
.methods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.mcard{text-align:left;border-radius:4px;padding:24px;cursor:default;transition:all 240ms var(--ease);font-family:var(--font-body);border:1px solid;position:relative;}
.mcard:hover{box-shadow:var(--shadow-card);}
.mcard.quanti{background:rgba(65,138,163,0.08);border-color:rgba(65,138,163,0.28);}
.mcard.quali{background:rgba(123,59,110,0.07);border-color:rgba(123,59,110,0.22);}
.mcard-stamp{position:absolute;top:16px;right:16px;font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;}
.mcard.quanti .mcard-stamp{background:rgba(65,138,163,0.18);color:var(--asagi);}
.mcard.quali .mcard-stamp{background:rgba(123,59,110,0.15);color:var(--shikon);}
.mcard-n{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;opacity:0.5;margin-bottom:20px;}
.mcard.quanti .mcard-n{color:var(--asagi);}
.mcard.quali .mcard-n{color:var(--shikon);}
.mcard-title{font-family:var(--font-display);font-size:22px;line-height:1.1;margin-bottom:10px;color:var(--ink);}
.mcard-desc{font-size:14px;line-height:1.5;}
.mcard.quanti .mcard-desc{color:var(--asagi);}
.mcard.quali .mcard-desc{color:var(--shikon);opacity:0.85;}

/* Rec stack */
.rec-wrap{padding:128px 0;border-top:1px solid var(--ink-8);}
.rec-stage{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center;max-width:1100px;margin:0 auto;}
.rec-deck{position:relative;width:100%;max-width:580px;min-height:640px;justify-self:center;}
.rec-card{position:absolute;inset:0;text-align:left;background:var(--paper);border:1px solid var(--ink-12);border-radius:8px;padding:28px;font-family:var(--font-body);cursor:pointer;transition:transform 400ms var(--ease),box-shadow 240ms var(--ease),border-color 240ms var(--ease);transform-origin:center top;box-shadow:0 1px 0 rgba(27,42,58,.04),0 16px 40px -20px rgba(27,42,58,.15);display:flex;flex-direction:column;gap:14px;min-height:640px;}
.rec-card.is-front{cursor:default;border-color:var(--ink-32);box-shadow:0 2px 0 rgba(27,42,58,.06),0 28px 56px -24px rgba(27,42,58,.28);}
.rec-card:not(.is-front):hover{border-color:var(--ink-32);}
.rec-top{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:12px;}
.rec-n{color:var(--ink-soft);letter-spacing:0.08em;}
.rec-imp{display:inline-flex;align-items:center;gap:4px;}
.rec-imp-dot{width:5px;height:5px;border-radius:999px;display:inline-block;}
.rec-imp-lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;margin-left:6px;font-weight:500;}
.rec-title{font-family:var(--font-display);font-weight:400;font-size:26px;line-height:1.15;letter-spacing:-0.01em;margin:0 0 4px;}
.rec-desc{color:var(--ink-soft);font-size:14px;line-height:1.5;margin:0;}
.rec-schema{display:grid;grid-template-columns:auto 1fr;gap:8px 20px;margin:4px 0 0;padding:16px 0;border-top:1px solid var(--ink-8);}
.rec-schema dt{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-soft);align-self:center;}
.rec-schema dd{margin:0;}
.rec-research{display:flex;gap:6px;flex-wrap:wrap;}
.rec-pill{display:inline-block;font-family:var(--font-body);font-size:12px;font-weight:500;padding:4px 10px;border-radius:3px;line-height:1.3;}
.rec-foot{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--ink-8);margin-top:auto;}
.rec-ice{display:flex;gap:14px;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.08em;}
.rec-ice strong{color:var(--ink);font-weight:500;margin-left:2px;}
.rec-score{color:var(--vermilion)!important;}
.rec-cta{font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--ink);}
.rec-card.is-front .rec-cta{color:var(--vermilion);}

/* Indicator */
.rec-indicator{display:flex;flex-direction:column;gap:4px;border-left:1px solid var(--ink-12);padding-left:20px;}
.rec-dot{background:transparent;border:none;padding:8px 0;font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:color 160ms var(--ease);color:var(--ink-faint);}
.rec-dot-bullet{display:inline-block;width:6px;height:6px;border-radius:999px;background:var(--ink-12);transition:all 160ms var(--ease);flex-shrink:0;}
.rec-dot:hover{color:var(--ink);}
.rec-dot.on{color:var(--vermilion);}
.rec-dot.on .rec-dot-bullet{background:var(--vermilion);width:8px;height:8px;}
.rec-dot-n{transition:color 160ms var(--ease);}

/* Team */
.team{padding:96px 0;border-top:1px solid var(--ink-8);}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:900px;margin-top:56px;}
.team-card{background:var(--bone);padding:32px 28px;border-radius:4px;border:1px solid var(--ink-8);border-top:3px solid var(--ink-12);transition:border-top-color 160ms var(--ease),box-shadow 160ms var(--ease);}
.team-card:hover{border-top-color:var(--vermilion);box-shadow:var(--shadow-card);}
.team-role{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-faint);margin-bottom:10px;}
.team-name{font-family:var(--font-display);font-size:28px;font-weight:400;margin-bottom:14px;line-height:1.1;}
.team-desc{font-size:15px;color:var(--ink-soft);line-height:1.55;margin-bottom:18px;}
.team-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.team-tag{font-family:var(--font-mono);font-size:10px;padding:4px 10px;background:var(--paper);color:var(--ink-soft);border-radius:2px;}
.team-link{font-size:13px;color:var(--vermilion);text-decoration:none;}
.team-link:hover{text-decoration:underline;}
.double-regard{margin-top:40px;padding:32px 36px;background:var(--ink);color:var(--paper);max-width:900px;border-radius:4px;}
.double-regard-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:rgba(244,237,224,0.4);margin-bottom:16px;}
.double-regard-item{margin-bottom:14px;font-size:15px;line-height:1.65;color:rgba(244,237,224,0.75);padding-left:18px;position:relative;}
.double-regard-item::before{content:'—';position:absolute;left:0;color:rgba(244,237,224,0.35);}
.double-regard-conclusion{margin-top:20px;padding-top:16px;border-top:1px solid rgba(244,237,224,0.12);font-size:12px;color:rgba(244,237,224,0.55);font-family:var(--font-mono);letter-spacing:0.04em;}

/* Booking */
.booking{padding:96px 0;border-top:1px solid var(--ink-8);display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
.book-left h3{font-family:var(--font-display);font-size:clamp(36px,4vw,52px);line-height:1.05;margin:16px 0 20px;letter-spacing:-0.01em;}
.book-left .lead{color:var(--ink-soft);font-size:18px;margin-bottom:32px;}
.book-points{list-style:none;padding:0;margin:0;}
.book-points li{padding:14px 0;border-top:1px solid var(--ink-12);font-size:15px;position:relative;padding-left:24px;}
.book-points li::before{content:'→';position:absolute;left:0;color:var(--vermilion);}
.book-points li:last-child{border-bottom:1px solid var(--ink-12);}
.book-form{background:var(--bone);border:1px solid var(--ink-8);border-radius:4px;padding:32px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.field label{display:block;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-soft);margin-bottom:8px;}
.field input,.field select,.field textarea{width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:15px;padding:12px 14px;background:var(--paper);color:var(--ink);border:1px solid var(--ink-32);border-radius:2px;outline:none;transition:all 160ms var(--ease);resize:vertical;appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--vermilion);box-shadow:0 0 0 3px rgba(200,65,58,0.12);}
.field-wide{grid-column:1/-1;}
.book-submit{display:flex;align-items:center;gap:20px;}
.book-submit .small{color:var(--ink-soft);font-size:13px;}

/* Footer */
.footer{padding:64px 0 32px;border-top:1px solid var(--ink-8);margin-top:96px;display:grid;grid-template-columns:1.5fr 2fr;gap:64px;}
.foot-left p{margin-top:12px;color:var(--ink-soft);max-width:32ch;font-size:15px;}
.foot-origin{margin-top:20px;padding-top:20px;border-top:1px solid var(--ink-8);font-size:13px;color:var(--ink-faint);line-height:1.6;font-style:italic;max-width:30ch;}
.foot-cols{display:grid;grid-template-columns:1fr 1fr;gap:32px;}
.foot-cols h6{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-faint);margin-bottom:14px;}
.foot-cols a{display:block;color:var(--ink);text-decoration:none;font-size:14px;margin-bottom:8px;}
.foot-cols a:hover{color:var(--vermilion);}
.foot-base{grid-column:1/-1;margin-top:40px;padding-top:20px;border-top:1px solid var(--ink-8);color:var(--ink-faint);font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;}

@media(max-width:900px){
  .page{padding:0 20px;}
  .pain-grid,.cycle,.booking,.team-grid,.footer,.methods-grid{grid-template-columns:1fr;gap:40px;}
  .methods-grid{grid-template-columns:1fr 1fr;}
  .book-form{grid-template-columns:1fr;}
  .rec-stage{grid-template-columns:1fr;gap:24px;}
  .rec-deck{height:580px;max-width:100%;}
  .rec-indicator{flex-direction:row;border-left:none;border-top:1px solid var(--ink-12);padding-left:0;padding-top:20px;justify-content:center;}
  .nav-links{gap:16px;}
  .nav-coming .coming-tooltip{left:auto;right:0;transform:none;}
}
@media(max-width:600px){
  .methods-grid{grid-template-columns:1fr;}
  .nav-links{gap:12px;}
}
</style>
</head>
<body>
<div class="page" id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

function Logo({size='md'}) {
  return (
    <span className={`logo-wordmark size-${size}`}>
      <span className="w">nexe</span><span className="d" aria-hidden="true"></span>
    </span>
  );
}

function Nav() {
  return (
    <nav className="nav">
      <a href="#" className="nav-logo"><Logo size="md"/></a>
      <div className="nav-links">
        <a href="#methodology">Démarche</a>
        <a href="#equipe">À propos</a>
        <span className="nav-coming">
          Brand × Performance
          <span className="coming-tooltip">À venir</span>
        </span>
      </div>
      <a href="#book" className="btn btn-primary">Réserver un call</a>
    </nav>
  );
}

function Hero() {
  return (
    <section className="hero">
      <div className="hero-overline">№ Audit CRO · 2026</div>
      <h1 className="hero-title">
        Votre trafic ne manque pas.<br/>
        <em>Vos conversions, si.</em>
      </h1>
      <p className="hero-lead">
        On identifie ce qui freine vos conversions et on priorise les actions qui ont le plus d'impact — en analysant votre site à travers votre business, vos utilisateurs et votre data.
      </p>
      <div className="hero-ctas">
        <a href="#book" className="btn btn-primary">Réserver un call</a>
      </div>
    </section>
  );
}

function Pain() {
  return (
    <section className="pain">
      <p className="overline">De ce qui bloque à ce qui a de l'impact</p>
      <div className="pain-grid">
        <div>
          <p className="pain-col-label">Votre site génère du trafic.<br/>Mais pas assez de revenus.</p>
          <ul className="pain-list">
            <li><span className="pain-dash">—</span><span>Vos campagnes ramènent du monde, mais le taux de conversion stagne.</span></li>
            <li><span className="pain-dash">—</span><span>Vous ne savez pas exactement où ni pourquoi vous perdez vos visiteurs.</span></li>
            <li><span className="pain-dash">—</span><span>Vos équipes ont des hypothèses, mais rien de priorisé ni de testé.</span></li>

/* Cycle geometry */
const CX=320,CY=320,R_OUTER=240,R_INNER=180,ICON_R=210;
const polar=(deg,r)=>{const rad=(deg-90)*Math.PI/180;return[CX+r*Math.cos(rad),CY+r*Math.sin(rad)];};
const arcPath=(s,e,rO,rI)=>{
  const[x1o,y1o]=polar(s,rO),[x2o,y2o]=polar(e,rO),[x2i,y2i]=polar(e,rI),[x1i,y1i]=polar(s,rI);
  const large=(e-s)>180?1:0;
  return `M ${x1o} ${y1o} A ${rO} ${rO} 0 ${large} 1 ${x2o} ${y2o} L ${x2i} ${y2i} A ${rI} ${rI} 0 ${large} 0 ${x1i} ${y1i} Z`;
};

const PHASES=[
  {n:'01',fr:'Lecture business',desc:'Comprendre votre contexte, vos objectifs, vos personas, leurs besoins et leurs contraintes réelles.',output:'Poser le bon cadre d\'analyse'},
  {n:'02',fr:'Recherche, Hypothèses & Insights',desc:'Recherche user basée sur des méthodes qualitatives et quantitatives croisées.',output:'Backlog d\'insights sourcés et structurés'},
  {n:'03',fr:'Priorisation des actions',desc:'Croiser les hypothèses business avec les insights pour faire émerger les leviers les plus pertinents.',output:'Backlog priorisé — impact, confiance, effort'},
  {n:'04',fr:'Conversion Redesign',desc:'Mise en production des variantes les plus prometteuses — A/B tests ou refontes ciblées selon les reco.',output:'Une approche orientée clarté, fluidité et performance'},
];
const SEG_COLORS=['#C8413A','#418AA3','#7B3B6E','#7A8F7A'];
const ICONS_SVG={
  '01':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 3h8l4 4v14H7z"/><path d="M15 3v4h4"/><circle cx="12" cy="14" r="2.5"/><path d="m14 16 2 2"/></g>,
  '02':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="6"/><path d="m19.5 19.5-3.5-3.5"/><path d="M8 13v-2M11 13V9M14 13v-3"/></g>,
  '03':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="14" height="4" rx="1"/><rect x="3" y="16" width="10" height="4" rx="1"/></g>,
  '04':<g fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3v4l-4 8a4 4 0 0 0 4 5h6a4 4 0 0 0 4-5l-4-8V3"/><path d="M9 3h6"/><path d="M7 14h10"/></g>,
};

function MethodologyCycle() {
  const[active,setActive]=useState(0);
  const seg=360/PHASES.length,gap=3;
  return (
    <div className="cycle">
      <div className="cycle-stage">
        <svg viewBox="0 0 640 640" className="cycle-svg">
          {PHASES.map((p,i)=>{
            const start=i*seg+gap/2,end=(i+1)*seg-gap/2,isActive=i===active;
            return <path key={p.n} d={arcPath(start,end,R_OUTER,R_INNER)} fill={isActive?'var(--vermilion)':SEG_COLORS[i]} opacity={isActive?1:0.72} style={{cursor:'pointer',transition:'fill 240ms var(--ease),opacity 240ms var(--ease)'}} onClick={()=>setActive(i)}/>;
          })}
          {PHASES.map((p,i)=>{
            const midDeg=i*seg+seg/2,[x,y]=polar(midDeg,ICON_R),isActive=i===active;
            return (
              <g key={p.n+'-icon'} transform={`translate(${x-26},${y-26})`} style={{cursor:'pointer'}} onClick={()=>setActive(i)}>
                <circle cx="26" cy="26" r="26" fill="var(--paper)" stroke={isActive?'var(--vermilion)':'var(--ink)'} strokeWidth="1.25"/>
                <g transform="translate(14,14)" style={{color:isActive?'var(--vermilion)':'var(--ink)'}}>{ICONS_SVG[p.n]}</g>
              </g>
            );
          })}
          <g textAnchor="middle">
            <text x={CX} y={CY+14} fontFamily="var(--font-display)" fontSize="52" fill="var(--ink)" letterSpacing="-0.5">Démarche</text>
            <text x={CX} y={CY+58} fontFamily="var(--font-display)" fontSize="52" fill="var(--vermilion)" fontStyle="italic">CRO.</text>
            <text x={CX} y={CY+92} fontFamily="var(--font-body)" fontSize="13" fill="var(--ink-soft)">Business · Utilisateurs · Données</text>
          </g>
        </svg>
      </div>
      <div className="cycle-legend">
        {PHASES.map((p,i)=>(
          <button key={p.n} className={'phase-row'+(i===active?' is-active':'')} onClick={()=>setActive(i)}>
            <span className="phase-n">{p.n}</span>
            <span className="phase-content">
              <span className="phase-title">{p.fr}</span>
              {i===active&&<>
                <span className="phase-desc">{p.desc}</span>
                <span className="phase-out">→ {p.output}</span>
              </>}
            </span>
          </button>
        ))}
      </div>
    </div>
  );
}

function Pill({kind,children}){const s=TAG[kind]||TAG.cat;return <span className="rec-pill" style={{background:s.bg,color:s.fg}}>{children}</span>;}
function ImpDots({level}){
  const color=IMPORTANCE[level]?.color||'#8A95A2';
  return <span className="rec-imp">{[1,2,3,4,5].map(i=><span key={i} className="rec-imp-dot" style={{background:i<=level?color:'rgba(27,42,58,0.12)'}}></span>)}<span className="rec-imp-lbl" style={{color}}>{IMPORTANCE[level]?.label}</span></span>;
}

function RecommendationStack(){
  const[order,setOrder]=useState([0,1,2,3,4,5]);
  const bringToFront=(idx)=>setOrder(prev=>[idx,...prev.filter(i=>i!==idx)]);
  // frontIdx is order[0] — the currently visible card

    <div className="rec-wrap" id="recos">

        <div className="rec-deck">
          {order.map((idx,pos)=>{
            const r=RECS[idx],isFront=pos===0;
            const offset=pos*14,shift=pos*16,scale=1-pos*0.035,rot=pos*-1.2;
            return (
              <button key={r.n} className={'rec-card'+(isFront?' is-front':'')}
                style={{transform:`translate(${shift}px,${offset}px) scale(${scale}) rotate(${rot}deg)`,zIndex:RECS.length-pos,opacity:pos>4?0:1}}
                onClick={()=>!isFront&&bringToFront(idx)} tabIndex={isFront?0:-1}
              >
                <header className="rec-top"><span className="rec-n">№ {r.n}</span><ImpDots level={r.importance}/></header>
                <h4 className="rec-title">{r.title}</h4>
                <p className="rec-desc">{r.desc}</p>
                <dl className="rec-schema">
                  <dt>Emplacement</dt><dd><Pill kind="place">{r.place}</Pill></dd>
                  <dt>Catégorie</dt><dd><Pill kind="cat">{r.cat}</Pill></dd>
                  <dt>Thème</dt><dd><Pill kind="theme">{r.theme}</Pill></dd>
                  <dt>Type d'action</dt><dd><Pill kind="action">{r.action}</Pill></dd>
                  <dt>Recherche</dt><dd className="rec-research">{r.research.map(x=><Pill key={x} kind="research">{x}</Pill>)}</dd>
                </dl>
                <footer className="rec-foot">
                  <div className="rec-ice"><span>I <strong>{r.ice.i}</strong></span><span>C <strong>{r.ice.c}</strong></span><span>E <strong>{r.ice.e}</strong></span><span className="rec-score">ICE {(r.ice.i*r.ice.c/r.ice.e).toFixed(1)}</span></div>
                  <span className="rec-cta">{r.cta} →</span>
                </footer>
              </button>
            );
          })}
        </div>
        <div className="rec-indicator">
          {order.map((idx,pos)=>{
            const isActive=pos===0;
            return (
              <button
                key={idx}
                className={'rec-dot'+(isActive?' on':'')}
                onClick={()=>bringToFront(idx)}
              >
                <span className="rec-dot-bullet"></span>
                <span className="rec-dot-n">{RECS[idx].n}</span>
              </button>
            );
          })}

      </div>
    </div>
  );
}
